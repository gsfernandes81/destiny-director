# Remote Pi 5 dev environment. Bring up + log in to everything in one command:
#   make dev            (= make dev-up  +  make dev-login)
# then reach the container over the Pi host's sshd:
#   ssh -t <pi-user>@<pi-ip> 'docker exec -it dd-dev fish'
# or drive it remotely from claude.ai/code — the entrypoint auto-starts
# `claude remote-control --spawn worktree` once you're signed in.
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        # Build the container's `dev` user with the HOST user's uid/gid so the
        # bind-mounted /workspace (below) stays writable. Pass via `make dev-up`
        # (HOST_UID=$(id -u) HOST_GID=$(id -g)); defaults to 1000 if unset.
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
    image: dd-dev
    container_name: dd-dev
    hostname: ${DEV_HOSTNAME:-dd-dev}   # Claude Code shows this as the machine title;
                                        # make dev-up sets it to <host-hostname>-dd-dev
    init: true
    env_file: [.env]                          # MYSQL_URL + RAILWAY_API_TOKEN + app vars
    environment:
      # Atlas dev/scratch database for `make atlas-migration-plan`. No usable Docker
      # in here, so point Atlas at a dedicated throwaway schema on the sibling MySQL
      # instead of a docker:// dev DB. The schema is created by docker-entrypoint.dev.sh.
      ATLAS_DEV_URL: mysql://root:devroot@mysql:3306/atlas_dev
    volumes:
      - .:/workspace                          # bind-mount the host clone; dev user uid built to match (USER_UID)
      - dd-uv-cache:/home/dev/.cache/uv        # persist uv cache (fast re-syncs)
      - dd-claude:/home/dev/.claude            # persist Claude Code login/config (incl. ~/.claude.json via CLAUDE_CONFIG_DIR)
      - dd-railway:/home/dev/.railway          # persist `railway login` (CLI writes ~/.railway/config.json, not ~/.config/railway)
      - dd-gh:/home/dev/.config/gh             # persist `gh auth login` (hosts.yml/config.yml under GH_CONFIG_DIR)
      - ${DEV_SSH_AUTHORIZED_KEYS}:/home/dev/.host-ssh:ro   # Pi host user's .ssh dir (from .env); sshd reads authorized_keys here
      - dd-ssh-host:/home/dev/.ssh-host        # persist sshd host key -> stable known_hosts
      - dd-zed-server:/home/dev/.zed_server    # persist Zed's remote server binary (no re-download per rebuild)
      - dd-local-share:/home/dev/.local/share  # persist fish history + bash history (HISTFILE points here)
    ports:
      - "${DEV_SSH_PORT:-2222}:2222"   # host ${DEV_SSH_PORT} (default 2222) -> container sshd; Cloudflare tunnel points here
    depends_on: [mysql]
    # Do NOT mount over /home/dev/venv or all of /home/dev — it would erase the
    # pre-built venv.
  mysql:
    image: mysql:8                            # arm64 image exists
    container_name: dd-mysql
    environment:
      MYSQL_ROOT_PASSWORD: devroot
      MYSQL_DATABASE: kyber
      MYSQL_USER: kyber
      MYSQL_PASSWORD: kyber
    volumes:
      - dd-mysql-data:/var/lib/mysql
volumes:
  dd-uv-cache:
  dd-claude:
  dd-railway:
  dd-gh:
  dd-ssh-host:
  dd-zed-server:
  dd-local-share:
  dd-mysql-data:
